<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=slides/week1/" />
  <title>SMA2106 Board Game Course</title>
  <style>
    :root {
      --bg: #fff8ec;
      --ink: #22201c;
      --teal: #0f6f72;
      --coral: #ec6a5c;
      --line: #eadcc4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background:
        linear-gradient(135deg, rgba(21, 154, 156, 0.13), transparent 36%),
        linear-gradient(315deg, rgba(236, 106, 92, 0.12), transparent 42%),
        var(--bg);
      color: var(--ink);
      display: grid;
      font-family: Arial, "Noto Sans Thai", sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 32px;
    }

    main {
      display: grid;
      gap: 18px;
      max-width: 760px;
    }

    p {
      font-size: 20px;
      line-height: 1.5;
      margin: 0;
    }

    h1 {
      color: var(--teal);
      font-size: clamp(42px, 7vw, 76px);
      line-height: 1.05;
      margin: 0;
    }

    a {
      background: var(--coral);
      border-radius: 8px;
      color: white;
      display: inline-flex;
      font-weight: 800;
      justify-content: center;
      padding: 12px 18px;
      text-decoration: none;
      width: fit-content;
    }
  </style>
</head>
<body>
  <main>
    <p>SMA2106 Board Game Course</p>
    <h1>Interactive Slide Lesson</h1>
    <p>กำลังเปิด Week 1 หากไม่เปลี่ยนหน้าอัตโนมัติ ให้กดปุ่มด้านล่าง</p>
    <a href="slides/week1/">เปิด Week 1</a>
  </main>
</body>
</html>
