<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Splendor Teach-to-Play Interactive Slides</title>
  <style>
    :root {
      --velvet: #241616;
      --wood: #5b321e;
      --paper: #fff8eb;
      --ink: #241f19;
      --muted: #7a6b58;
      --gold: #d9a441;
      --ruby: #c83d3a;
      --emerald: #1f9c68;
      --sapphire: #2366b8;
      --onyx: #22242a;
      --diamond: #f8f0df;
      --line: #e4cfaa;
      --teal: #117a76;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 15% 10%, rgba(217, 164, 65, .22), transparent 30%),
        radial-gradient(circle at 86% 16%, rgba(31, 156, 104, .14), transparent 28%),
        linear-gradient(135deg, #201211, #3b201a 50%, #0f3433);
      color: var(--ink);
      font-family: Arial, "Noto Sans Thai", sans-serif;
      min-height: 100vh;
    }

    button, input { font: inherit; }

    .deck {
      display: grid;
      min-height: 100vh;
    }

    .frame {
      background:
        linear-gradient(135deg, rgba(255, 248, 235, .99), rgba(255, 252, 244, .985)),
        repeating-linear-gradient(90deg, rgba(91, 50, 30, .035), rgba(91, 50, 30, .035) 2px, transparent 2px, transparent 26px);
      height: 100vh;
      overflow: hidden;
      position: relative;
      width: 100vw;
    }

    .progress {
      background: linear-gradient(90deg, var(--emerald), var(--gold), var(--ruby));
      height: 8px;
      left: 0;
      position: absolute;
      top: 0;
      transition: width 160ms ease;
      z-index: 3;
    }

    .meta {
      color: var(--muted);
      display: flex;
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 800;
      justify-content: space-between;
      left: clamp(28px, 4vw, 72px);
      position: absolute;
      right: clamp(28px, 4vw, 72px);
      top: clamp(18px, 2.4vw, 34px);
      z-index: 3;
    }

    .slide {
      display: grid;
      height: 100%;
      padding: clamp(72px, 8vw, 118px) clamp(56px, 8vw, 132px) clamp(72px, 7vw, 108px);
      place-items: stretch;
    }

    .layout {
      align-content: center;
      display: grid;
      gap: clamp(18px, 2.4vw, 30px);
      height: 100%;
    }

    .split {
      align-items: center;
      grid-template-columns: minmax(0, 1fr) minmax(440px, .95fr);
    }

    .eyebrow {
      color: var(--teal);
      font-size: clamp(15px, 1.55vw, 22px);
      font-weight: 900;
      letter-spacing: 0;
      margin: 0;
      text-transform: uppercase;
    }

    h1, h2 {
      letter-spacing: 0;
      line-height: 1.05;
      margin: 0;
    }

    h1 { font-size: clamp(52px, 7.3vw, 104px); max-width: 1250px; }
    h2 { font-size: clamp(36px, 5.6vw, 72px); max-width: 1180px; }

    p, li, span {
      font-size: clamp(18px, 2vw, 28px);
      line-height: 1.35;
    }

    p { margin: 0; }

    .prompt {
      color: var(--muted);
      font-weight: 800;
    }

    .controls {
      align-items: center;
      background: rgba(36, 22, 22, .14);
      border-radius: 999px;
      bottom: 16px;
      display: flex;
      gap: 10px;
      left: 50%;
      opacity: .25;
      padding: 8px;
      position: fixed;
      transform: translateX(-50%);
      transition: opacity 160ms ease;
      z-index: 10;
    }

    .controls:hover, .controls:focus-within { opacity: 1; }

    button, .link-button {
      align-items: center;
      background: var(--teal);
      border: 1px solid var(--teal);
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: inline-flex;
      font-weight: 900;
      justify-content: center;
      min-height: 40px;
      padding: 9px 15px;
      text-decoration: none;
    }

    button.secondary {
      background: white;
      border-color: var(--line);
      color: var(--ink);
    }

    button.active {
      background: var(--ruby);
      border-color: var(--ruby);
      color: white;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .48;
    }

    .controls span {
      color: rgba(255,255,255,.9);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .table-scene {
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.16), transparent 14%),
        linear-gradient(135deg, #173f38, #102b29);
      border: 14px solid var(--wood);
      border-radius: 18px;
      box-shadow: 0 26px 70px rgba(36, 22, 22, .24);
      display: grid;
      gap: 16px;
      min-height: 500px;
      padding: 26px;
    }

    .market {
      display: grid;
      gap: 12px;
    }

    .market-row {
      align-items: center;
      display: grid;
      gap: 12px;
      grid-template-columns: 72px repeat(4, 1fr);
    }

    .level-badge {
      color: #ffe7aa;
      font-size: 18px;
      font-weight: 900;
      text-align: center;
    }

    .dev-card, .noble-card, .mini-card, .feedback {
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 16px 36px rgba(36, 22, 22, .12);
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .dev-card {
      min-height: 126px;
    }

    .dev-top {
      align-items: center;
      display: flex;
      justify-content: space-between;
    }

    .score {
      color: var(--gold);
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
    }

    .bonus {
      border-radius: 50%;
      height: 28px;
      width: 28px;
    }

    .ruby { background: var(--ruby); }
    .emerald { background: var(--emerald); }
    .sapphire { background: var(--sapphire); }
    .onyx { background: var(--onyx); }
    .diamond { background: var(--diamond); border: 1px solid #d9cbb3; }
    .gold { background: var(--gold); }

    .cost {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .gem {
      align-items: center;
      border: 2px solid rgba(255,255,255,.72);
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(255,255,255,.42), 0 3px 7px rgba(0,0,0,.18);
      color: white;
      display: inline-flex;
      font-size: 14px;
      font-weight: 900;
      height: 34px;
      justify-content: center;
      width: 34px;
    }

    .gem.diamond { color: #4a4031; }

    .token-bank {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .token-bank .gem { height: 48px; width: 48px; }

    .flow {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(4, 1fr);
    }

    .flow > div, .answer-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      display: grid;
      gap: 8px;
      min-height: 152px;
      padding: 20px;
    }

    .flow strong, .answer-card strong {
      color: var(--ruby);
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1.02;
    }

    .choice-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .quiz-grid, .three-grid, .two-grid {
      display: grid;
      gap: 16px;
    }

    .quiz-grid { grid-template-columns: repeat(2, 1fr); }
    .three-grid { grid-template-columns: repeat(3, 1fr); }
    .two-grid { grid-template-columns: repeat(2, 1fr); }

    .answer-card {
      align-items: start;
      color: var(--ink);
      min-height: 180px;
      text-align: left;
    }

    .answer-card span { color: var(--ink); }

    button.answer-card.active {
      background: #fff5e1;
      border-color: var(--ruby);
      color: var(--ink);
    }

    button.answer-card.active span { color: var(--ink); }

    .answer-card.correct {
      border-color: rgba(31, 156, 104, .55);
      box-shadow: 0 18px 48px rgba(31, 156, 104, .14);
    }

    button.answer-card.active.correct {
      background: #ecfff7;
      border-color: rgba(31, 156, 104, .75);
    }

    .feedback {
      border: 2px solid #b8ded8;
      justify-self: start;
      max-width: 980px;
    }

    .feedback strong {
      color: var(--teal);
      font-size: clamp(22px, 2.4vw, 36px);
    }

    .rule-strip {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .rule-callout {
      background: #fffdf7;
      border: 2px solid var(--line);
      border-left-width: 10px;
      border-radius: 8px;
      display: grid;
      gap: 4px;
      padding: 12px 14px;
    }

    .rule-callout strong {
      color: var(--ink);
      font-size: clamp(17px, 1.7vw, 24px);
      line-height: 1.15;
    }

    .rule-callout span {
      color: var(--muted);
      font-size: clamp(15px, 1.45vw, 20px);
      font-weight: 800;
    }

    .rule-callout.must { border-left-color: var(--ruby); }
    .rule-callout.can { border-left-color: var(--emerald); }
    .rule-callout.note { border-left-color: var(--gold); }
    .rule-callout.trap { border-left-color: var(--onyx); }

    .token-table {
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 0;
      overflow: hidden;
    }

    .token-table div {
      align-items: center;
      border-bottom: 1px solid var(--line);
      display: grid;
      font-size: clamp(17px, 1.7vw, 24px);
      font-weight: 900;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 12px 14px;
    }

    .token-table div:last-child { border-bottom: 0; }
    .token-table .head { background: #fff0c2; color: #624511; }

    .deck-stack {
      align-content: center;
      background: linear-gradient(135deg, #213b3a, #132625);
      border: 3px solid #d3a752;
      border-radius: 10px;
      color: #ffe9ae;
      display: grid;
      font-size: clamp(22px, 2.4vw, 34px);
      font-weight: 900;
      min-height: 148px;
      padding: 20px;
      text-align: center;
    }

    .end-track {
      align-items: center;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(4, 1fr);
    }

    .end-track div {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 122px;
      padding: 16px;
    }

    .end-track strong {
      color: var(--teal);
      display: block;
      font-size: clamp(22px, 2.4vw, 34px);
      margin-bottom: 6px;
    }

    .card-anatomy {
      align-items: center;
      display: grid;
      gap: 28px;
      grid-template-columns: 360px 1fr;
    }

    .big-card {
      background: linear-gradient(180deg, white, #fff3df);
      border: 2px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 28px 70px rgba(36, 22, 22, .2);
      display: grid;
      gap: 22px;
      min-height: 500px;
      padding: 28px;
    }

    .big-card .score { font-size: 72px; }
    .big-card .bonus { height: 54px; width: 54px; }
    .big-card .gem { height: 46px; width: 46px; }

    .label-list {
      display: grid;
      gap: 14px;
      margin: 0;
      padding-left: 1.2em;
    }

    .calc {
      align-items: start;
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr 1fr;
    }

    .counter-row {
      align-items: center;
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }

    .counter-row span {
      font-weight: 900;
    }

    .count-controls {
      display: flex;
      gap: 6px;
    }

    .count-controls button {
      height: 38px;
      min-height: 38px;
      padding: 0;
      width: 38px;
    }

    .noble-card {
      align-content: center;
      min-height: 220px;
      text-align: center;
    }

    .noble-card strong {
      color: var(--gold);
      font-size: 64px;
      line-height: 1;
    }

    .check-list {
      display: grid;
      gap: 12px;
    }

    .check-list button {
      justify-content: flex-start;
      text-align: left;
    }

    .video-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(15, 63, 66, 0.14);
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .video-frame {
      aspect-ratio: 16 / 9;
      background: #111;
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
    }

    .video-frame iframe {
      border: 0;
      height: 100%;
      width: 100%;
    }

    .video-card a {
      color: var(--teal);
      font-size: clamp(14px, 1.35vw, 18px);
      font-weight: 900;
      text-decoration: none;
    }

    .notes {
      background: #fff8dd;
      border: 1px solid #ead388;
      border-radius: 8px;
      bottom: 24px;
      color: #5c4313;
      font-size: clamp(14px, 1.3vw, 18px);
      font-weight: 800;
      left: 34px;
      line-height: 1.4;
      padding: 10px 12px;
      position: absolute;
      right: 34px;
      z-index: 4;
    }

    .small {
      color: var(--muted);
      font-size: clamp(14px, 1.4vw, 18px);
      font-weight: 800;
    }

    @media (max-width: 760px) {
      .frame { overflow-y: auto; }
      .meta {
        display: grid;
        gap: 4px 12px;
        grid-template-columns: 1fr auto;
        left: 20px;
        right: 20px;
        top: 20px;
      }
      .meta span:nth-child(4) {
        grid-column: 1 / -1;
      }
      .slide { padding: 128px 20px 96px; }
      .split, .flow, .quiz-grid, .three-grid, .two-grid, .card-anatomy, .calc, .rule-strip, .end-track {
        grid-template-columns: 1fr;
      }
      h1 { font-size: clamp(38px, 12vw, 56px); }
      h2 { font-size: clamp(30px, 9.5vw, 44px); }
      p, li, span { font-size: clamp(16px, 4.8vw, 22px); }
      .table-scene {
        border-width: 10px;
        min-height: 380px;
        padding: 14px;
      }
      .market-row {
        grid-template-columns: 1fr 1fr;
      }
      .controls {
        left: 8px;
        right: 8px;
        transform: none;
      }
      .controls span { display: none; }
    }

    body.presentation-mode .deck { padding: 0; }
    body.presentation-mode .frame {
      border: 0;
      box-shadow: none;
      height: 100vh;
      width: 100vw;
    }
    body.presentation-mode .slide {
      height: 100vh;
      padding: clamp(62px, 7vw, 104px) clamp(54px, 7vw, 118px) clamp(60px, 6vw, 94px);
      width: 100vw;
    }
  </style>
</head>
<body>
  <main class="deck">
    <section class="frame">
      <div class="progress" id="progress"></div>
      <div class="meta">
        <span>Splendor Teach-to-Play</span>
        <span id="count">1/12</span>
        <span id="minutes">5 นาที</span>
        <span id="totalMeta">รวม 70 นาที + เล่นจริง</span>
      </div>
      <div class="slide" id="slide"></div>
      <aside class="notes" id="notes" hidden></aside>
    </section>
    <nav class="controls">
      <button class="secondary" id="back">Back</button>
      <button class="secondary" id="noteToggle">Notes</button>
      <button class="secondary" id="full">Full screen</button>
      <span id="elapsed">0 นาที / 65 นาที</span>
      <button id="next">Next</button>
    </nav>
  </main>

  <script>
    const slides = [
      { id: "title", minutes: 5, html: titleSlide },
      { id: "setup", minutes: 6, html: setupSlide },
      { id: "anatomy", minutes: 6, html: anatomySlide },
      { id: "goal", minutes: 4, html: goalSlide },
      { id: "actions", minutes: 8, html: actionsSlide },
      { id: "take", minutes: 6, html: takeTokenSlide },
      { id: "buy", minutes: 8, html: buySlide },
      { id: "reserve", minutes: 5, html: reserveSlide },
      { id: "noble", minutes: 6, html: nobleSlide },
      { id: "endgame", minutes: 5, html: endGameSlide },
      { id: "quiz", minutes: 6, html: quizSlide },
      { id: "video", minutes: 5, html: videoSlide },
      { id: "play", minutes: 0, html: playSlide }
    ];

    const notes = {
      title: "เป้าหมายคือให้ผู้เรียนเริ่มเล่นได้ในคาบ ไม่ใช่จำ rulebook ทั้งเล่ม",
      setup: "ชี้บนโต๊ะจริงไปพร้อมกับสไลด์: แถวการ์ด 3 ระดับ, noble, token bank",
      anatomy: "จับการ์ดจริง 1 ใบขึ้นมาเทียบกับสไลด์",
      actions: "หลังสไลด์นี้ให้ผู้เรียนลองบอก action ที่ตัวเองอยากทำ 1 อย่าง",
      buy: "เน้นว่าโบนัสคือส่วนลดถาวร ไม่ใช่ token ที่ใช้แล้วหมด",
      reserve: "จองได้ทั้งการ์ดหงายและใบบนจากกอง ถ้าการ์ดหงายหายให้เติมใบใหม่ทันที",
      noble: "ย้ำว่า noble ดูจากโบนัสบนการ์ด ไม่ใช่ token ในมือ และรับได้มากสุด 1 ใบต่อเทิร์น",
      endgame: "ให้ผู้เรียนซ้อมพูดว่า 'จบรอบก่อน' เพราะมือใหม่มักเข้าใจว่าถึง 15 แล้วจบทันที",
      quiz: "ใช้เป็น checkpoint ก่อนปล่อยเล่นจริง"
    };

    const totalMinutes = slides.reduce((sum, slide) => sum + slide.minutes, 0);
    let index = 0;
    let showNotes = false;
    let actionChoice = "";
    let tokenChoice = "";
    let reserveChoice = "";
    let nobleChoice = "";
    let quizChoice = "";
    let endChoice = "";
    const bonuses = { sapphire: 1, emerald: 0, ruby: 0, onyx: 0, diamond: 0 };

    function gem(color, text = "") {
      return `<span class="gem ${color}">${text}</span>`;
    }

    function card({ score = 0, bonus = "emerald", cost = [] }) {
      return `<div class="dev-card"><div class="dev-top"><strong class="score">${score || ""}</strong><span class="bonus ${bonus}"></span></div><div class="cost">${cost.map(([c, n]) => gem(c, n)).join("")}</div></div>`;
    }

    function rule(type, title, text) {
      const labels = { must: "ต้องทำ", can: "ทำได้", note: "ห้ามลืม", trap: "กับดักมือใหม่" };
      return `<div class="rule-callout ${type}"><strong>${labels[type]}: ${title}</strong><span>${text}</span></div>`;
    }

    function minutesLabel(total) {
      return total >= 60 ? `${Math.floor(total / 60)} ชม. ${total % 60} นาที` : `${total} นาที`;
    }

    function render() {
      const current = slides[index];
      document.getElementById("progress").style.width = `${((index + 1) / slides.length) * 100}%`;
      document.getElementById("count").textContent = `${index + 1}/${slides.length}`;
      document.getElementById("minutes").textContent = current.minutes ? minutesLabel(current.minutes) : "เริ่มเล่น";
      document.getElementById("elapsed").textContent = `${minutesLabel(slides.slice(0, index).reduce((sum, slide) => sum + slide.minutes, 0))} / ${minutesLabel(totalMinutes)}`;
      document.getElementById("totalMeta").textContent = `รวม ${minutesLabel(totalMinutes)} + เล่นจริง`;
      document.getElementById("back").disabled = index === 0;
      document.getElementById("next").disabled = index === slides.length - 1;
      document.getElementById("slide").innerHTML = current.html();
      const noteBox = document.getElementById("notes");
      noteBox.hidden = !showNotes;
      noteBox.textContent = notes[current.id] || "ให้ผู้เรียนตอบก่อนค่อยเฉลย อย่าอ่านสไลด์แทนการเล่นจริง";
      bindEvents();
    }

    function bindEvents() {
      document.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => {
          actionChoice = button.dataset.action;
          render();
        });
      });
      document.querySelectorAll("[data-token]").forEach((button) => {
        button.addEventListener("click", () => {
          tokenChoice = button.dataset.token;
          render();
        });
      });
      document.querySelectorAll("[data-reserve]").forEach((button) => {
        button.addEventListener("click", () => {
          reserveChoice = button.dataset.reserve;
          render();
        });
      });
      document.querySelectorAll("[data-noble]").forEach((button) => {
        button.addEventListener("click", () => {
          nobleChoice = button.dataset.noble;
          render();
        });
      });
      document.querySelectorAll("[data-quiz]").forEach((button) => {
        button.addEventListener("click", () => {
          quizChoice = button.dataset.quiz;
          render();
        });
      });
      document.querySelectorAll("[data-end]").forEach((button) => {
        button.addEventListener("click", () => {
          endChoice = button.dataset.end;
          render();
        });
      });
      document.querySelectorAll("[data-bonus]").forEach((button) => {
        button.addEventListener("click", () => {
          bonuses[button.dataset.bonus] = Math.max(0, bonuses[button.dataset.bonus] + Number(button.dataset.delta));
          render();
        });
      });
    }

    function titleSlide() {

      return `<div class="layout"><p class="eyebrow">Start Playing</p><h2>เริ่มเล่นจริง: 3 ตาแรกต้องพูดเหตุผลก่อนจบตา</h2><div class="flow"><div><strong>ดู</strong><span>การ์ดที่ซื้อได้และการ์ดที่อยากไปต่อ</span></div><div><strong>เลือก</strong><span>หนึ่ง action จาก 4 อย่าง</span></div><div><strong>อธิบาย</strong><span>ตานี้แก้ปัญหาอะไร</span></div><div><strong>บันทึก</strong><span>Observer จด decision สำคัญ</span></div></div><a class="link-button" href="../week1/">กลับไปสไลด์ Week 1</a></div>`;
    }

    document.getElementById("next").addEventListener("click", () => { index = Math.min(index + 1, slides.length - 1); showNotes = false; render(); });
    document.getElementById("back").addEventListener("click", () => { index = Math.max(index - 1, 0); showNotes = false; render(); });
    document.getElementById("noteToggle").addEventListener("click", () => { showNotes = !showNotes; render(); });
    document.getElementById("full").addEventListener("click", async () => {
      if (document.fullscreenElement) {
        await document.exitFullscreen();
      } else {
        document.body.classList.add("presentation-mode");
        await document.documentElement.requestFullscreen();
      }
    });
    document.addEventListener("fullscreenchange", () => {
      document.body.classList.toggle("presentation-mode", Boolean(document.fullscreenElement));
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") document.getElementById("next").click();
      if (event.key === "ArrowLeft") document.getElementById("back").click();
    });
    render();
  </script>
</body>
</html>
