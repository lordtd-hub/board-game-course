<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>สไลด์สอนเล่น Splendor</title>
  <style>
    :root {
      --velvet: #241616;
      --wood: #5b321e;
      --paper: #fff8eb;
      --ink: #241f19;
      --muted: #7a6b58;
      --gold: #d9a441;
      --ruby: #c83d3a;
      --emerald: #1f9c68;
      --sapphire: #2366b8;
      --onyx: #22242a;
      --diamond: #f8f0df;
      --line: #e4cfaa;
      --teal: #117a76;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 15% 10%, rgba(217, 164, 65, .22), transparent 30%),
        radial-gradient(circle at 86% 16%, rgba(31, 156, 104, .14), transparent 28%),
        linear-gradient(135deg, #201211, #3b201a 50%, #0f3433);
      color: var(--ink);
      font-family: Arial, "Noto Sans Thai", sans-serif;
      min-height: 100vh;
    }

    button, input { font: inherit; }

    .deck {
      display: grid;
      min-height: 100vh;
    }

    .frame {
      background:
        linear-gradient(135deg, rgba(255, 248, 235, .99), rgba(255, 252, 244, .985)),
        repeating-linear-gradient(90deg, rgba(91, 50, 30, .035), rgba(91, 50, 30, .035) 2px, transparent 2px, transparent 26px);
      height: 100vh;
      overflow: hidden;
      position: relative;
      width: 100vw;
    }

    .progress {
      background: linear-gradient(90deg, var(--emerald), var(--gold), var(--ruby));
      height: 8px;
      left: 0;
      position: absolute;
      top: 0;
      transition: width 160ms ease;
      z-index: 3;
    }

    .meta {
      color: var(--muted);
      display: flex;
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 800;
      justify-content: space-between;
      left: clamp(28px, 4vw, 72px);
      position: absolute;
      right: clamp(28px, 4vw, 72px);
      top: clamp(18px, 2.4vw, 34px);
      z-index: 3;
    }

    .slide {
      display: grid;
      height: 100%;
      padding: clamp(72px, 8vw, 118px) clamp(56px, 8vw, 132px) clamp(72px, 7vw, 108px);
      place-items: stretch;
    }

    .layout {
      align-content: center;
      display: grid;
      gap: clamp(18px, 2.4vw, 30px);
      height: 100%;
    }

    .split {
      align-items: center;
      grid-template-columns: minmax(0, 1fr) minmax(440px, .95fr);
    }

    .eyebrow {
      color: var(--teal);
      font-size: clamp(15px, 1.55vw, 22px);
      font-weight: 900;
      letter-spacing: 0;
      margin: 0;
      text-transform: uppercase;
    }

    h1, h2 {
      letter-spacing: 0;
      line-height: 1.05;
      margin: 0;
    }

    h1 { font-size: clamp(52px, 7.3vw, 104px); max-width: 1250px; }
    h2 { font-size: clamp(36px, 5.6vw, 72px); max-width: 1180px; }

    p, li, span {
      font-size: clamp(18px, 2vw, 28px);
      line-height: 1.35;
    }

    p { margin: 0; }

    .prompt {
      color: var(--muted);
      font-weight: 800;
    }

    .controls {
      align-items: center;
      background: rgba(36, 22, 22, .14);
      border-radius: 999px;
      bottom: 16px;
      display: flex;
      gap: 10px;
      left: 50%;
      opacity: .25;
      padding: 8px;
      position: fixed;
      transform: translateX(-50%);
      transition: opacity 160ms ease;
      z-index: 10;
    }

    .controls:hover, .controls:focus-within { opacity: 1; }

    button, .link-button {
      align-items: center;
      background: var(--teal);
      border: 1px solid var(--teal);
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: inline-flex;
      font-weight: 900;
      justify-content: center;
      min-height: 40px;
      padding: 9px 15px;
      text-decoration: none;
    }

    button.secondary {
      background: white;
      border-color: var(--line);
      color: var(--ink);
    }

    button.active {
      background: var(--ruby);
      border-color: var(--ruby);
      color: white;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .48;
    }

    .controls span {
      color: rgba(255,255,255,.9);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .table-scene {
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.16), transparent 14%),
        linear-gradient(135deg, #173f38, #102b29);
      border: 14px solid var(--wood);
      border-radius: 18px;
      box-shadow: 0 26px 70px rgba(36, 22, 22, .24);
      display: grid;
      gap: 16px;
      min-height: 500px;
      padding: 26px;
    }

    .market {
      display: grid;
      gap: 12px;
    }

    .market-row {
      align-items: center;
      display: grid;
      gap: 12px;
      grid-template-columns: 72px repeat(4, 1fr);
    }

    .level-badge {
      color: #ffe7aa;
      font-size: 18px;
      font-weight: 900;
      text-align: center;
    }

    .dev-card, .noble-card, .mini-card, .feedback {
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 16px 36px rgba(36, 22, 22, .12);
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .dev-card {
      min-height: 126px;
    }

    .dev-top {
      align-items: center;
      display: flex;
      justify-content: space-between;
    }

    .score {
      color: var(--gold);
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
    }

    .bonus {
      border-radius: 50%;
      height: 28px;
      width: 28px;
    }

    .ruby { background: var(--ruby); }
    .emerald { background: var(--emerald); }
    .sapphire { background: var(--sapphire); }
    .onyx { background: var(--onyx); }
    .diamond { background: var(--diamond); border: 1px solid #d9cbb3; }
    .gold { background: var(--gold); }

    .cost {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .gem {
      align-items: center;
      border: 2px solid rgba(255,255,255,.72);
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(255,255,255,.42), 0 3px 7px rgba(0,0,0,.18);
      color: white;
      display: inline-flex;
      font-size: 14px;
      font-weight: 900;
      height: 34px;
      justify-content: center;
      width: 34px;
    }

    .gem.diamond { color: #4a4031; }

    .bonus-req {
      align-items: center;
      border: 2px solid rgba(255,255,255,.72);
      border-radius: 8px;
      box-shadow: inset 0 2px 4px rgba(255,255,255,.28), 0 3px 7px rgba(0,0,0,.14);
      color: white;
      display: inline-flex;
      font-size: 15px;
      font-weight: 900;
      height: 36px;
      justify-content: center;
      min-width: 36px;
      padding: 0 8px;
    }

    .bonus-req.diamond { color: #4a4031; }

    .token-bank {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .token-bank .gem { height: 48px; width: 48px; }

    .flow {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(4, 1fr);
    }

    .flow > div, .answer-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      display: grid;
      gap: 8px;
      min-height: 152px;
      padding: 20px;
    }

    .flow strong, .answer-card strong {
      color: var(--ruby);
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1.02;
    }

    .choice-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .quiz-grid, .three-grid, .two-grid {
      display: grid;
      gap: 16px;
    }

    .quiz-grid { grid-template-columns: repeat(2, 1fr); }
    .three-grid { grid-template-columns: repeat(3, 1fr); }
    .two-grid { grid-template-columns: repeat(2, 1fr); }

    .answer-card {
      align-items: start;
      color: var(--ink);
      min-height: 180px;
      text-align: left;
    }

    .answer-card span { color: var(--ink); }

    button.answer-card.active {
      background: #fff5e1;
      border-color: var(--ruby);
      color: var(--ink);
    }

    button.answer-card.active span { color: var(--ink); }

    .answer-card.correct {
      border-color: rgba(31, 156, 104, .55);
      box-shadow: 0 18px 48px rgba(31, 156, 104, .14);
    }

    button.answer-card.active.correct {
      background: #ecfff7;
      border-color: rgba(31, 156, 104, .75);
    }

    .feedback {
      border: 2px solid #b8ded8;
      justify-self: start;
      max-width: 980px;
    }

    .feedback strong {
      color: var(--teal);
      font-size: clamp(22px, 2.4vw, 36px);
    }

    .rule-strip {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .rule-callout {
      background: #fffdf7;
      border: 2px solid var(--line);
      border-left-width: 10px;
      border-radius: 8px;
      display: grid;
      gap: 4px;
      padding: 12px 14px;
    }

    .rule-callout strong {
      color: var(--ink);
      font-size: clamp(17px, 1.7vw, 24px);
      line-height: 1.15;
    }

    .rule-callout span {
      color: var(--muted);
      font-size: clamp(15px, 1.45vw, 20px);
      font-weight: 800;
    }

    .rule-callout.must { border-left-color: var(--ruby); }
    .rule-callout.can { border-left-color: var(--emerald); }
    .rule-callout.note { border-left-color: var(--gold); }
    .rule-callout.trap { border-left-color: var(--onyx); }

    .token-table {
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 0;
      overflow: hidden;
    }

    .token-table div {
      align-items: center;
      border-bottom: 1px solid var(--line);
      display: grid;
      font-size: clamp(17px, 1.7vw, 24px);
      font-weight: 900;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 12px 14px;
    }

    .token-table div:last-child { border-bottom: 0; }
    .token-table .head { background: #fff0c2; color: #624511; }

    .deck-stack {
      align-content: center;
      background: linear-gradient(135deg, #213b3a, #132625);
      border: 3px solid #d3a752;
      border-radius: 10px;
      color: #ffe9ae;
      display: grid;
      font-size: clamp(22px, 2.4vw, 34px);
      font-weight: 900;
      min-height: 148px;
      padding: 20px;
      text-align: center;
    }

    .end-track {
      align-items: center;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(4, 1fr);
    }

    .end-track div {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 122px;
      padding: 16px;
    }

    .end-track strong {
      color: var(--teal);
      display: block;
      font-size: clamp(22px, 2.4vw, 34px);
      margin-bottom: 6px;
    }

    .card-anatomy {
      align-items: center;
      display: grid;
      gap: 28px;
      grid-template-columns: 360px 1fr;
    }

    .big-card {
      background: linear-gradient(180deg, white, #fff3df);
      border: 2px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 28px 70px rgba(36, 22, 22, .2);
      display: grid;
      gap: 22px;
      min-height: 500px;
      padding: 28px;
    }

    .big-card .score { font-size: 72px; }
    .big-card .bonus { height: 54px; width: 54px; }
    .big-card .gem { height: 46px; width: 46px; }

    .label-list {
      display: grid;
      gap: 14px;
      margin: 0;
      padding-left: 1.2em;
    }

    .calc {
      align-items: start;
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr 1fr;
    }

    .counter-row {
      align-items: center;
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }

    .counter-row span {
      font-weight: 900;
    }

    .count-controls {
      display: flex;
      gap: 6px;
    }

    .count-controls button {
      height: 38px;
      min-height: 38px;
      padding: 0;
      width: 38px;
    }

    .noble-card {
      align-content: center;
      min-height: 220px;
      text-align: center;
    }

    .noble-card strong {
      color: var(--gold);
      font-size: 64px;
      line-height: 1;
    }

    .check-list {
      display: grid;
      gap: 12px;
    }

    .check-list button {
      justify-content: flex-start;
      text-align: left;
    }

    .video-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(15, 63, 66, 0.14);
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .video-frame {
      aspect-ratio: 16 / 9;
      background: #111;
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
    }

    .video-frame iframe {
      border: 0;
      height: 100%;
      width: 100%;
    }

    .video-card a {
      color: var(--teal);
      font-size: clamp(14px, 1.35vw, 18px);
      font-weight: 900;
      text-decoration: none;
    }

    .notes {
      background: #fff8dd;
      border: 1px solid #ead388;
      border-radius: 8px;
      bottom: 24px;
      color: #5c4313;
      font-size: clamp(14px, 1.3vw, 18px);
      font-weight: 800;
      left: 34px;
      line-height: 1.4;
      padding: 10px 12px;
      position: absolute;
      right: 34px;
      z-index: 4;
    }

    .small {
      color: var(--muted);
      font-size: clamp(14px, 1.4vw, 18px);
      font-weight: 800;
    }

    @media (max-width: 760px) {
      .frame { overflow-y: auto; }
      .meta {
        display: grid;
        gap: 4px 12px;
        grid-template-columns: 1fr auto;
        left: 20px;
        right: 20px;
        top: 20px;
      }
      .meta span:nth-child(4) {
        grid-column: 1 / -1;
      }
      .slide { padding: 128px 20px 96px; }
      .split, .flow, .quiz-grid, .three-grid, .two-grid, .card-anatomy, .calc, .rule-strip, .end-track {
        grid-template-columns: 1fr;
      }
      h1 { font-size: clamp(38px, 12vw, 56px); }
      h2 { font-size: clamp(30px, 9.5vw, 44px); }
      p, li, span { font-size: clamp(16px, 4.8vw, 22px); }
      .table-scene {
        border-width: 10px;
        min-height: 380px;
        padding: 14px;
      }
      .market-row {
        grid-template-columns: 1fr 1fr;
      }
      .controls {
        left: 8px;
        right: 8px;
        transform: none;
      }
      .controls span { display: none; }
    }

    body.presentation-mode .deck { padding: 0; }
    body.presentation-mode .frame {
      border: 0;
      box-shadow: none;
      height: 100vh;
      width: 100vw;
    }
    body.presentation-mode .slide {
      height: 100vh;
      padding: clamp(62px, 7vw, 104px) clamp(54px, 7vw, 118px) clamp(60px, 6vw, 94px);
      width: 100vw;
    }
  </style>
</head>
<body>
  <main class="deck">
    <section class="frame">
      <div class="progress" id="progress"></div>
      <div class="meta">
        <span>สไลด์สอนเล่น Splendor</span>
        <span id="count">1/12</span>
        <span id="minutes">5 นาที</span>
        <span id="totalMeta">รวม 64 นาที + เล่นจริง</span>
      </div>
      <div class="slide" id="slide"></div>
      <aside class="notes" id="notes" hidden></aside>
    </section>
    <nav class="controls">
      <button class="secondary" id="back">Back</button>
      <button class="secondary" id="noteToggle">Notes</button>
      <button class="secondary" id="full">Full screen</button>
      <span id="elapsed">0 นาที / 64 นาที</span>
      <button id="next">Next</button>
    </nav>
  </main>

  <script>
    const slides = [
      { id: "title", minutes: 5, html: titleSlide },
      { id: "setup", minutes: 6, html: setupSlide },
      { id: "anatomy", minutes: 6, html: anatomySlide },
      { id: "goal", minutes: 4, html: goalSlide },
      { id: "actions", minutes: 8, html: actionsSlide },
      { id: "take", minutes: 6, html: takeTokenSlide },
      { id: "buy", minutes: 8, html: buySlide },
      { id: "reserve", minutes: 5, html: reserveSlide },
      { id: "noble", minutes: 6, html: nobleSlide },
      { id: "endgame", minutes: 5, html: endGameSlide },
      { id: "video", minutes: 5, html: videoSlide },
      { id: "play", minutes: 0, html: playSlide }
    ];

    const notes = {
      title: "เป้าหมายคือให้ผู้เรียนเริ่มเล่นได้ในคาบ ไม่ใช่จำคู่มือทั้งเล่ม",
      setup: "ชี้บนโต๊ะจริงไปพร้อมกับสไลด์: แถวการ์ด 3 ระดับ, Noble, กองโทเคน",
      anatomy: "จับการ์ดจริง 1 ใบขึ้นมาเทียบกับสไลด์",
      actions: "ชี้ของจริงประกอบทุกแอ็กชัน แล้ววนตัวอย่าง 1 ตาให้ดู",
      take: "หยิบโทเคนให้ดูจริง 2 แบบ: สามสีต่างกัน และสีเดียวสองเม็ดเมื่อกองมีอย่างน้อย 4",
      buy: "เน้นว่าโบนัสคือส่วนลดถาวร ไม่ใช่โทเคนที่ใช้แล้วหมด",
      reserve: "จองได้ทั้งการ์ดหงายและใบบนจากกอง ถ้าการ์ดหงายหายให้เติมใบใหม่ทันที",
      noble: "ย้ำว่า Noble ดูจากโบนัสบนการ์ด ไม่ใช่โทเคนในมือ และรับได้มากสุด 1 ใบต่อเทิร์น",
      endgame: "ให้ผู้เรียนจำประโยคเดียว: ถึง 15 แล้วต้องเล่นให้จบรอบก่อน",
      video: "เปิดคลิปเฉพาะช่วงที่ช่วยย้ำกติกา อย่าให้คลิปกินเวลาการเล่นจริง",
      play: "จบสไลด์นี้ให้เริ่มเกมทันที ผู้สอนเดินช่วยตามโต๊ะใน 2-3 ตาแรก"
    };

    const totalMinutes = slides.reduce((sum, slide) => sum + slide.minutes, 0);
    let index = 0;
    let showNotes = false;
    const bonuses = { sapphire: 1, emerald: 0, ruby: 0, onyx: 0, diamond: 0 };

    function gem(color, text = "") {
      return `<span class="gem ${color}">${text}</span>`;
    }

    function bonusReq(color, text = "") {
      return `<span class="bonus-req ${color}">${text}</span>`;
    }

    function card({ score = 0, bonus = "emerald", cost = [] }) {
      return `<div class="dev-card"><div class="dev-top"><strong class="score">${score || ""}</strong><span class="bonus ${bonus}"></span></div><div class="cost">${cost.map(([c, n]) => gem(c, n)).join("")}</div></div>`;
    }

    function rule(type, title, text) {
      const labels = { must: "ต้องทำ", can: "ทำได้", note: "ห้ามลืม", trap: "กับดักมือใหม่" };
      return `<div class="rule-callout ${type}"><strong>${labels[type]}: ${title}</strong><span>${text}</span></div>`;
    }

    function minutesLabel(total) {
      return total >= 60 ? `${Math.floor(total / 60)} ชม. ${total % 60} นาที` : `${total} นาที`;
    }

    function render() {
      const current = slides[index];
      document.getElementById("progress").style.width = `${((index + 1) / slides.length) * 100}%`;
      document.getElementById("count").textContent = `${index + 1}/${slides.length}`;
      document.getElementById("minutes").textContent = current.minutes ? minutesLabel(current.minutes) : "เริ่มเล่น";
      document.getElementById("elapsed").textContent = `${minutesLabel(slides.slice(0, index).reduce((sum, slide) => sum + slide.minutes, 0))} / ${minutesLabel(totalMinutes)}`;
      document.getElementById("totalMeta").textContent = `รวม ${minutesLabel(totalMinutes)} + เล่นจริง`;
      document.getElementById("back").disabled = index === 0;
      document.getElementById("next").disabled = index === slides.length - 1;
      document.getElementById("slide").innerHTML = current.html();
      const noteBox = document.getElementById("notes");
      noteBox.hidden = !showNotes;
      noteBox.textContent = notes[current.id] || "ใช้สไลด์เป็นลำดับสอน แล้วชี้อุปกรณ์จริงประกอบทุกครั้ง";
      bindEvents();
    }

    function bindEvents() {
      document.querySelectorAll("[data-bonus]").forEach((button) => {
        button.addEventListener("click", () => {
          bonuses[button.dataset.bonus] = Math.max(0, bonuses[button.dataset.bonus] + Number(button.dataset.delta));
          render();
        });
      });
    }

    function titleSlide() {
      return `<div class="layout split"><div><p class="eyebrow">สอนเล่นเร็ว</p><h1>เล่น Splendor ให้เป็นใน 15 นาทีแรก</h1><p class="prompt">รู้เป้าหมาย อ่านการ์ดออก เลือกแอ็กชันได้ แล้วเริ่มเล่นจริง</p></div><div class="table-scene"><div class="token-bank">${gem("emerald")} ${gem("sapphire")} ${gem("ruby")} ${gem("onyx")} ${gem("diamond")} ${gem("gold")}</div><div class="market"><div class="market-row"><span class="level-badge">III</span>${card({score:4,bonus:"ruby",cost:[["ruby",3],["onyx",3],["diamond",3]]})}${card({score:5,bonus:"sapphire",cost:[["sapphire",7]]})}${card({score:4,bonus:"emerald",cost:[["emerald",3],["diamond",6]]})}${card({score:3,bonus:"onyx",cost:[["onyx",5],["ruby",3]]})}</div><div class="market-row"><span class="level-badge">II</span>${card({score:2,bonus:"diamond",cost:[["sapphire",3],["emerald",2]]})}${card({score:1,bonus:"emerald",cost:[["emerald",2],["ruby",2],["onyx",3]]})}${card({score:2,bonus:"onyx",cost:[["diamond",5]]})}${card({score:1,bonus:"ruby",cost:[["ruby",2],["sapphire",3]]})}</div><div class="market-row"><span class="level-badge">I</span>${card({bonus:"sapphire",cost:[["sapphire",1],["emerald",1],["ruby",1]]})}${card({bonus:"ruby",cost:[["diamond",2],["onyx",1]]})}${card({bonus:"emerald",cost:[["emerald",2]]})}${card({bonus:"diamond",cost:[["ruby",1],["onyx",1],["diamond",1]]})}</div></div></div></div>`;
    }

    function setupSlide() {
      return `<div class="layout split"><div><p class="eyebrow">จัดโต๊ะก่อนเริ่ม</p><h2>ก่อนเริ่ม ให้ทุกคนเห็นแถวการ์ดและกองโทเคนชัดๆ</h2><div class="flow"><div><strong>1</strong><span>การ์ด 3 ระดับ หงายระดับละ 4 ใบ</span></div><div><strong>2</strong><span>แผ่น Noble = จำนวนผู้เล่น + 1</span></div><div><strong>3</strong><span>โทเคน 5 สี + gold</span></div><div><strong>4</strong><span>พื้นที่ของแต่ละคน: โทเคน, การ์ดที่ซื้อแล้ว, การ์ดที่จองไว้</span></div></div>${rule("note", "เติมแถวการ์ดทันที", "เมื่อการ์ดหงายถูกซื้อหรือถูกจอง ให้เปิดใบใหม่จากกองระดับเดียวกันถ้ายังมี")}</div><div><div class="token-table"><div class="head"><span>ผู้เล่น</span><span>โทเคนสีละ</span><span>gold</span></div><div><span>2 คน</span><span>4 เม็ด</span><span>5 เม็ด</span></div><div><span>3 คน</span><span>5 เม็ด</span><span>5 เม็ด</span></div><div><span>4 คน</span><span>7 เม็ด</span><span>5 เม็ด</span></div></div><p class="prompt">โทเคนในมือใช้แล้วหมด แต่โบนัสบนการ์ดเป็นส่วนลดถาวร</p></div></div>`;
    }

    function anatomySlide() {
      return `<div class="layout card-anatomy"><div class="big-card"><div class="dev-top"><strong class="score">2</strong><span class="bonus sapphire"></span></div><div class="cost">${gem("sapphire",3)}${gem("emerald",2)}${gem("diamond",1)}</div><p class="small">ตัวอย่างการ์ดพัฒนา</p></div><div><p class="eyebrow">อ่านการ์ด</p><h2>อ่านการ์ดออก เกมจะง่ายขึ้นทันที</h2><ol class="label-list"><li><strong>มุมซ้ายบน:</strong> คะแนนที่ได้เมื่อซื้อการ์ดใบนี้</li><li><strong>มุมขวาบน:</strong> โบนัสถาวร ใช้ลดราคาการ์ดใบต่อๆ ไป</li><li><strong>ด้านล่าง:</strong> โทเคนที่ต้องจ่าย หลังหักโบนัสแล้ว</li></ol></div></div>`;
    }

    function goalSlide() {
      return `<div class="layout split"><div><p class="eyebrow">เป้าหมาย</p><h2>เก็บให้ถึง 15 คะแนน แต่เกมยังไม่จบทันที</h2><p class="prompt">คะแนนมาจากการ์ดและ Noble ทุกตาควรพาเราเข้าใกล้คะแนนมากขึ้น</p><div class="rule-strip">${rule("must", "ถึง 15 แล้วจบรอบ", "เล่นต่อจนทุกคนมีจำนวนตาเท่ากันก่อนนับผู้ชนะ")}${rule("trap", "คะแนนเท่ากันดูจำนวนการ์ด", "ถ้าคะแนนเท่ากัน คนที่ซื้อการ์ดพัฒนาน้อยกว่าชนะ")}</div></div><div class="three-grid"><div class="answer-card"><strong>รีบทำแต้ม</strong><span>ซื้อการ์ดที่มีคะแนนเร็วขึ้น</span></div><div class="answer-card"><strong>สะสมส่วนลด</strong><span>ซื้อการ์ดถูกๆ เพื่อให้ใบต่อไปจ่ายน้อยลง</span></div><div class="answer-card"><strong>ลุ้น Noble</strong><span>สะสมโบนัสให้ Noble เข้ามาเอง</span></div></div></div>`;
    }

    function actionsSlide() {
      return `<div class="layout"><p class="eyebrow">หนึ่งตา เลือกหนึ่งแอ็กชัน</p><h2>โครงของตาง่ายมาก: ดูการ์ด แล้วเลือกทำ 1 อย่าง</h2><div class="flow"><div><strong>1</strong><span>หยิบโทเคน 3 สีต่างกัน เพื่อเปิดทางซื้อหลายใบ</span></div><div><strong>2</strong><span>หยิบโทเคนสีเดียว 2 เม็ด ถ้ากองสีนั้นมีอย่างน้อย 4</span></div><div><strong>3</strong><span>จองการ์ด แล้วรับ gold ถ้ายังมีเหลือ</span></div><div><strong>4</strong><span>ซื้อการ์ด จ่ายโทเคนหลังหักโบนัส แล้ววางการ์ดไว้หน้าเรา</span></div></div><div class="rule-strip">${rule("must", "เลือกแค่ 1 แอ็กชัน", "ทำเสร็จแล้วจบตา ไม่ทำหลายอย่างต่อกัน")}${rule("note", "เช็กโทเคนก่อนผ่านตา", "จบตาต้องถือโทเคนไม่เกิน 10 เม็ด")}</div></div>`;
    }

    function takeTokenSlide() {
      return `<div class="layout split"><div><p class="eyebrow">หยิบโทเคน</p><h2>ถ้ายังซื้อไม่ได้ ให้หยิบโทเคนเพื่อเตรียมซื้อใบถัดไป</h2><div class="rule-strip">${rule("can", "หยิบ 3 สีต่างกัน", "หยิบได้สีละ 1 เม็ด รวมไม่เกิน 3 เม็ด")}${rule("can", "หยิบ 2 สีเดียวกัน", "ทำได้เฉพาะตอนกองสีนั้นมีอย่างน้อย 4 เม็ดก่อนหยิบ")}${rule("trap", "อย่าถือเกิน 10", "ถ้าจบตาแล้วมีเกิน 10 เม็ด ต้องคืนจนเหลือ 10")}${rule("note", "gold ไม่หยิบตรงๆ", "gold ได้จากการจองการ์ดเท่านั้น")}</div></div><div class="table-scene"><div class="token-bank">${gem("emerald","4")}${gem("sapphire","5")}${gem("ruby","3")}${gem("onyx","6")}${gem("diamond","4")}${gem("gold","5")}</div><p class="prompt">ให้ผู้สอนชี้กองจริง: สีที่มี 4 ขึ้นไปหยิบคู่ได้ สีที่มี 3 หยิบคู่ไม่ได้</p></div></div>`;
    }

    function buySlide() {
      const need = { sapphire: 3, emerald: 2, diamond: 1 };
      const pay = Object.fromEntries(Object.entries(need).map(([color, amount]) => [color, Math.max(0, amount - (bonuses[color] || 0))]));
      const totalPay = Object.values(pay).reduce((sum, value) => sum + value, 0);
      return `<div class="layout calc"><div><p class="eyebrow">ลองคำนวณตอนซื้อ</p><h2>โบนัสถาวรทำให้การ์ดถูกลง</h2><div class="big-card"><div class="dev-top"><strong class="score">2</strong><span class="bonus sapphire"></span></div><div class="cost">${gem("sapphire",3)}${gem("emerald",2)}${gem("diamond",1)}</div></div></div><div><div class="mini-card"><p class="prompt">ปรับจำนวนโบนัสที่มี แล้วดูโทเคนที่ต้องจ่ายจริง</p>${Object.keys(bonuses).map((color) => `<div class="counter-row"><span>${gem(color)} โบนัส ${bonuses[color]}</span><div class="count-controls"><button data-bonus="${color}" data-delta="-1">-</button><button data-bonus="${color}" data-delta="1">+</button></div></div>`).join("")}</div><div class="feedback"><strong>ต้องจ่ายจริง ${totalPay} โทเคน</strong><p>${gem("sapphire", pay.sapphire)} ${gem("emerald", pay.emerald)} ${gem("diamond", pay.diamond)} ถ้าโบนัสครบพอ บางใบซื้อได้ฟรี</p></div></div></div>`;
    }

    function reserveSlide() {
      return `<div class="layout split"><div><p class="eyebrow">จองการ์ด</p><h2>Reserve ใช้เก็บใบสำคัญไว้ก่อน หรือเอา gold มาช่วยซื้อ</h2><div class="rule-strip">${rule("can", "จองการ์ดหงาย", "หยิบการ์ดจากแถวเข้ามือ แล้วเติมใบใหม่จากกองระดับเดียวกัน")}${rule("can", "จองจากกอง", "จั่วใบบนจากกองระดับ I/II/III ได้ โดยไม่ต้องเปิดให้คนอื่นดู")}${rule("note", "ได้ gold ถ้ามี", "ถ้า gold หมด ยังจองได้ แค่ไม่ได้ gold")}${rule("trap", "ถือได้สูงสุด 3 ใบ", "การ์ดที่จองแล้วทิ้งไม่ได้ ต้องซื้อภายหลังหรือถือไว้จนจบเกม")}</div></div><div class="two-grid">${card({score:4,bonus:"ruby",cost:[["ruby",3],["onyx",3],["diamond",3]]})}<div class="deck-stack">จั่วใบบน<br>จากกองระดับ I/II/III</div><div class="noble-card"><strong>${gem("gold")}</strong><span>รับ gold ถ้ามีเหลือ</span></div><div class="answer-card"><strong>สูงสุด 3</strong><span>การ์ดที่จองไว้ในมือของผู้เล่นแต่ละคน</span></div></div></div>`;
    }

    function nobleSlide() {
      return `<div class="layout split"><div><p class="eyebrow">Noble</p><h2>Noble เป็นคะแนนฟรีที่ได้จากโบนัสบนการ์ด</h2><div class="rule-strip">${rule("must", "ดูโบนัส ไม่ดูโทเคน", "นับสัญลักษณ์โบนัสบนการ์ดที่ซื้อแล้วเท่านั้น")}${rule("must", "มาเองท้ายตา", "ถ้าโบนัสครบตามเงื่อนไข จะรับ Noble โดยไม่ใช้แอ็กชัน")}${rule("note", "รับได้ตาละ 1 ใบ", "ถ้าเข้าเงื่อนไขหลายใบ เลือก Noble ได้ 1 ใบ")}${rule("trap", "Noble ไม่ให้โบนัสเพิ่ม", "ได้ 3 คะแนน แต่ไม่ได้เพิ่มสีสำหรับซื้อการ์ด")}</div></div><div class="two-grid"><div class="noble-card"><strong>3</strong><div class="cost">${bonusReq("emerald",3)}${bonusReq("sapphire",3)}${bonusReq("ruby",3)}</div><span>ต้องมีโบนัสสีละ 3</span></div><div class="noble-card"><strong>3</strong><div class="cost">${bonusReq("onyx",3)}${bonusReq("diamond",3)}${bonusReq("sapphire",3)}</div><span>ถ้าครบหลายใบ เลือก 1 ใบ</span></div></div></div>`;
    }

    function endGameSlide() {
      return `<div class="layout"><p class="eyebrow">จบเกม</p><h2>ถึง 15 คะแนนแล้ว เล่นให้จบรอบก่อนค่อยตัดสินผู้ชนะ</h2><div class="end-track"><div><strong>1</strong><span>ผู้เล่นคนหนึ่งมีคะแนนถึง 15 หรือมากกว่า</span></div><div><strong>2</strong><span>เล่นต่อจนจบรอบปัจจุบัน</span></div><div><strong>3</strong><span>ทุกคนมีจำนวนตาเท่ากัน</span></div><div><strong>4</strong><span>คะแนนสูงสุดชนะ ถ้าเสมอกัน คนที่ซื้อการ์ดน้อยกว่าชนะ</span></div></div><p class="prompt">ตอนสอน ให้พูดประโยคนี้ซ้ำ: “แตะ 15 แล้วไม่จบทันที ต้องเล่นให้จบรอบก่อน”</p></div>`;
    }


    function videoSlide() {
      return `<div class="layout split"><div><p class="eyebrow">คลิปช่วยสอน</p><h2>ใช้คลิปไทยช่วยสรุปกติกา แล้วหยุดให้ลองจับของจริง</h2><p class="prompt">แนะนำให้เปิดเฉพาะช่วงกติกาหลัก แล้ว pause ทุกครั้งที่มีแอ็กชันสำคัญ</p></div><div class="video-card"><div class="video-frame"><iframe src="https://www.youtube.com/embed/Mc8-4zA-nDw" title="วิธีเล่น Splendor โดย Wanderer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div><a href="https://www.youtube.com/watch?v=Mc8-4zA-nDw" target="_blank" rel="noreferrer">เปิดบน YouTube ถ้าคลิปไม่โหลด</a></div></div>`;
    }

    function playSlide() {
      return `<div class="layout"><p class="eyebrow">เริ่มเล่นจริง</p><h2>3 ตาแรก ให้พูดเหตุผลก่อนจบตา</h2><div class="flow"><div><strong>ดู</strong><span>การ์ดที่ซื้อได้และการ์ดที่อยากไปต่อ</span></div><div><strong>เลือก</strong><span>หนึ่งแอ็กชันจาก 4 อย่าง</span></div><div><strong>อธิบาย</strong><span>ตานี้แก้ปัญหาอะไร</span></div><div><strong>จด</strong><span>คนจดช่วยบันทึกจังหวะตัดสินใจสำคัญ</span></div></div><a class="link-button" href="../week1/">กลับไปสไลด์ Week 1</a></div>`;
    }

    document.getElementById("next").addEventListener("click", () => { index = Math.min(index + 1, slides.length - 1); showNotes = false; render(); });
    document.getElementById("back").addEventListener("click", () => { index = Math.max(index - 1, 0); showNotes = false; render(); });
    document.getElementById("noteToggle").addEventListener("click", () => { showNotes = !showNotes; render(); });
    document.getElementById("full").addEventListener("click", async () => {
      if (document.fullscreenElement) {
        await document.exitFullscreen();
      } else {
        document.body.classList.add("presentation-mode");
        await document.documentElement.requestFullscreen();
      }
    });
    document.addEventListener("fullscreenchange", () => {
      document.body.classList.toggle("presentation-mode", Boolean(document.fullscreenElement));
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") document.getElementById("next").click();
      if (event.key === "ArrowLeft") document.getElementById("back").click();
    });
    render();
  </script>
</body>
</html>
