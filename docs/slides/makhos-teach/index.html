<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>หมากฮอสไทย Teach-to-Play Interactive Slides</title>
  <style>
    :root {
      --bg: #101423;
      --paper: #fff8e8;
      --ink: #211d18;
      --muted: #756c5f;
      --line: #e5d2ad;
      --thai-red: #d64045;
      --indigo: #243b83;
      --gold: #d9a441;
      --jade: #14866d;
      --cream: #fff1c9;
      --dark-square: #2f4b44;
      --light-square: #f1d69f;
      --piece-dark: #1d2433;
      --piece-light: #f8f0df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 15% 15%, rgba(217, 164, 65, .22), transparent 26%),
        radial-gradient(circle at 85% 8%, rgba(214, 64, 69, .18), transparent 24%),
        linear-gradient(135deg, #101423, #21142a 48%, #0e3f3a);
      color: var(--ink);
      font-family: Arial, "Noto Sans Thai", sans-serif;
      min-height: 100vh;
    }

    button { font: inherit; }

    .deck {
      display: grid;
      min-height: 100vh;
    }

    .frame {
      background:
        linear-gradient(135deg, rgba(255, 248, 232, .99), rgba(250, 253, 248, .985)),
        radial-gradient(circle at 90% 82%, rgba(20, 134, 109, .1), transparent 28%);
      height: 100vh;
      overflow: hidden;
      position: relative;
      width: 100vw;
    }

    .progress {
      background: linear-gradient(90deg, var(--thai-red), var(--gold), var(--jade), var(--indigo));
      height: 8px;
      left: 0;
      position: absolute;
      top: 0;
      transition: width 160ms ease;
      z-index: 4;
    }

    .meta {
      color: var(--muted);
      display: flex;
      font-size: clamp(11px, 1.15vw, 14px);
      font-weight: 900;
      justify-content: space-between;
      left: clamp(28px, 4vw, 72px);
      position: absolute;
      right: clamp(28px, 4vw, 72px);
      top: clamp(18px, 2.4vw, 34px);
      z-index: 4;
    }

    .slide {
      display: grid;
      height: 100%;
      padding: clamp(72px, 8vw, 118px) clamp(52px, 8vw, 132px) clamp(72px, 7vw, 108px);
      place-items: stretch;
    }

    .layout {
      align-content: center;
      display: grid;
      gap: clamp(18px, 2.4vw, 30px);
      height: 100%;
    }

    .split {
      align-items: center;
      grid-template-columns: minmax(0, 1fr) minmax(420px, .9fr);
    }

    .wide-split {
      align-items: center;
      grid-template-columns: minmax(440px, .92fr) minmax(0, 1fr);
    }

    .eyebrow {
      color: var(--jade);
      font-size: clamp(15px, 1.55vw, 22px);
      font-weight: 900;
      margin: 0;
      text-transform: uppercase;
    }

    h1, h2 {
      letter-spacing: 0;
      line-height: 1.05;
      margin: 0;
    }

    h1 { font-size: clamp(56px, 7.2vw, 108px); max-width: 1260px; }
    h2 { font-size: clamp(36px, 5.3vw, 72px); max-width: 1180px; }

    p, li, span {
      font-size: clamp(18px, 2vw, 28px);
      line-height: 1.35;
    }

    p { margin: 0; }

    .prompt {
      color: var(--muted);
      font-weight: 800;
    }

    .controls {
      align-items: center;
      background: rgba(16, 20, 35, .14);
      border-radius: 999px;
      bottom: 16px;
      display: flex;
      gap: 10px;
      left: 50%;
      opacity: .25;
      padding: 8px;
      position: fixed;
      transform: translateX(-50%);
      transition: opacity 160ms ease;
      z-index: 20;
    }

    .controls:hover, .controls:focus-within { opacity: 1; }

    button, .link-button {
      align-items: center;
      background: var(--jade);
      border: 1px solid var(--jade);
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: inline-flex;
      font-weight: 900;
      justify-content: center;
      min-height: 40px;
      padding: 9px 15px;
      text-decoration: none;
    }

    button.secondary {
      background: white;
      border-color: var(--line);
      color: var(--ink);
    }

    button.active {
      background: var(--thai-red);
      border-color: var(--thai-red);
      color: white;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .48;
    }

    .controls span {
      color: rgba(255,255,255,.9);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .board-shell {
      background:
        linear-gradient(135deg, #5f321e, #2e1810);
      border-radius: 18px;
      box-shadow: 0 28px 70px rgba(16, 20, 35, .26);
      padding: 18px;
    }

    .board {
      aspect-ratio: 1;
      background: #2f4b44;
      border: 8px solid #8e5c34;
      border-radius: 10px;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      max-height: min(68vh, 720px);
      max-width: min(68vh, 720px);
      overflow: hidden;
      width: 100%;
    }

    .sq {
      align-items: center;
      display: grid;
      justify-items: center;
      min-width: 0;
      position: relative;
    }

    .sq.light { background: var(--light-square); }
    .sq.dark { background: var(--dark-square); }
    .sq.hint { box-shadow: inset 0 0 0 6px rgba(217, 164, 65, .9); }
    .sq.capture { box-shadow: inset 0 0 0 6px rgba(214, 64, 69, .88); }
    .sq.king-row::after {
      background: rgba(217, 164, 65, .28);
      bottom: 0;
      content: "";
      left: 0;
      position: absolute;
      right: 0;
      top: 0;
    }

    .piece {
      align-items: center;
      border-radius: 50%;
      box-shadow:
        inset 0 6px 12px rgba(255,255,255,.28),
        inset 0 -8px 16px rgba(0,0,0,.25),
        0 9px 18px rgba(0,0,0,.22);
      display: inline-flex;
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 900;
      height: 68%;
      justify-content: center;
      position: relative;
      width: 68%;
      z-index: 2;
    }

    .piece.dark-piece {
      background: linear-gradient(145deg, #384254, #101724);
      color: #ffe7aa;
    }

    .piece.light-piece {
      background: linear-gradient(145deg, #fff8e8, #d9c497);
      border: 1px solid rgba(96, 76, 46, .5);
      color: #263248;
    }

    .piece.king::after {
      content: "ฮ";
      font-size: .78em;
    }

    .piece.mark::before {
      border: 4px solid var(--gold);
      border-radius: 50%;
      bottom: -7px;
      content: "";
      left: -7px;
      position: absolute;
      right: -7px;
      top: -7px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .legend span, .mini-card, .feedback, .rule-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 16px 38px rgba(16, 20, 35, .11);
      padding: 14px 16px;
    }

    .flow, .two-grid, .three-grid, .quiz-grid {
      display: grid;
      gap: 16px;
    }

    .flow { grid-template-columns: repeat(4, 1fr); }
    .two-grid, .quiz-grid { grid-template-columns: repeat(2, 1fr); }
    .three-grid { grid-template-columns: repeat(3, 1fr); }

    .rule-card {
      display: grid;
      gap: 8px;
      min-height: 150px;
    }

    .rule-card strong {
      color: var(--thai-red);
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1.05;
    }

    .choice-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .answer-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 16px 38px rgba(16, 20, 35, .11);
      display: grid;
      gap: 8px;
      min-height: 168px;
      padding: 18px;
      text-align: left;
    }

    .answer-card strong {
      color: var(--indigo);
      font-size: clamp(24px, 2.8vw, 38px);
      line-height: 1;
    }

    .answer-card.correct {
      border-color: rgba(20, 134, 109, .56);
      box-shadow: 0 18px 48px rgba(20, 134, 109, .14);
    }

    .feedback {
      border: 2px solid #b6dfd4;
      display: grid;
      gap: 8px;
      justify-self: start;
      max-width: 980px;
    }

    .feedback strong {
      color: var(--jade);
      font-size: clamp(22px, 2.4vw, 34px);
      line-height: 1.1;
    }

    .notes {
      background: #fff8dd;
      border: 1px solid #ead388;
      border-radius: 8px;
      bottom: 24px;
      color: #5c4313;
      font-size: clamp(14px, 1.3vw, 18px);
      font-weight: 800;
      left: 34px;
      line-height: 1.4;
      padding: 10px 12px;
      position: absolute;
      right: 34px;
      z-index: 12;
    }

    .small {
      color: var(--muted);
      font-size: clamp(14px, 1.35vw, 18px);
      font-weight: 800;
    }

    @media (max-width: 760px) {
      .frame { overflow-y: auto; }
      .slide { padding: 58px 20px 52px; }
      .split, .wide-split, .flow, .two-grid, .three-grid, .quiz-grid {
        grid-template-columns: 1fr;
      }
      .controls {
        left: 8px;
        right: 8px;
        transform: none;
      }
      .controls span { display: none; }
    }
  </style>
</head>
<body>
  <main class="deck">
    <section class="frame">
      <div class="progress" id="progress"></div>
      <div class="meta">
        <span>หมากฮอสไทย Teach-to-Play</span>
        <span id="count">1/12</span>
        <span id="minutes">4 นาที</span>
        <span>รวม 52 นาที + เล่นจริง</span>
      </div>
      <div class="slide" id="slide"></div>
      <aside class="notes" id="notes" hidden></aside>
    </section>
    <nav class="controls">
      <button class="secondary" id="back">Back</button>
      <button class="secondary" id="noteToggle">Notes</button>
      <button class="secondary" id="full">Full screen</button>
      <span id="elapsed">0 นาที / 52 นาที</span>
      <button id="next">Next</button>
    </nav>
  </main>

  <script>
    const slides = [
      { id: "title", minutes: 4, html: titleSlide },
      { id: "setup", minutes: 5, html: setupSlide },
      { id: "move", minutes: 5, html: moveSlide },
      { id: "capture", minutes: 6, html: captureSlide },
      { id: "forced", minutes: 5, html: forcedSlide },
      { id: "chain", minutes: 6, html: chainSlide },
      { id: "king", minutes: 5, html: kingSlide },
      { id: "kingPower", minutes: 5, html: kingPowerSlide },
      { id: "win", minutes: 3, html: winSlide },
      { id: "quiz1", minutes: 4, html: quizOneSlide },
      { id: "quiz2", minutes: 4, html: quizTwoSlide },
      { id: "play", minutes: 0, html: playSlide }
    ];

    const notes = {
      title: "เริ่มจากภาพรวมว่าเรียนเพื่อเล่นได้ ไม่ใช่ท่องกฎการแข่งขันทั้งหมด",
      setup: "ให้ผู้เรียนจับกระดานจริงและวาง 8 ตัวพร้อมสไลด์",
      move: "ชี้ว่าช่องที่เล่นได้คือช่องสีเข้มเท่านั้น และหมากธรรมดาถอยไม่ได้",
      capture: "ให้ผู้เรียนพูดเองว่าต้องข้ามหมากฝ่ายตรงข้ามและลงช่องว่าง",
      forced: "เน้นว่านี่คือกฎที่ทำให้เกมมีแผนล่อและกับดัก",
      chain: "เล่นช้า ๆ ให้เห็นว่าตัวเดิมต้องกินต่อจนหมดทาง",
      king: "ใช้คำว่า เข้าฮอส/หงาย ให้ตรงกับภาษาที่นักศึกษาคุ้น",
      kingPower: "เทียบหมากธรรมดากับฮอสเพื่อให้เห็นความสำคัญของแถวสุดท้าย",
      quiz1: "ให้ตอบก่อนเฉลย เพื่อจับ misconception เรื่องถอยหลังและบังคับกิน",
      quiz2: "เช็กก่อนปล่อยเล่นจริง"
    };

    const totalMinutes = slides.reduce((sum, slide) => sum + slide.minutes, 0);
    let index = 0;
    let showNotes = false;
    let moveChoice = "";
    let captureChoice = "";
    let forcedChoice = "";
    let chainStep = 0;
    let kingChoice = "";
    let quizOne = "";
    let quizTwo = "";

    function minutesLabel(total) {
      return total >= 60 ? `${Math.floor(total / 60)} ชม. ${total % 60} นาที` : `${total} นาที`;
    }

    function piece(kind, extra = "") {
      const className = kind === "light" ? "light-piece" : "dark-piece";
      return `<span class="piece ${className} ${extra}"></span>`;
    }

    function board(config = {}) {
      const pieces = config.pieces || {};
      const hints = new Set(config.hints || []);
      const captures = new Set(config.captures || []);
      const kingRows = new Set(config.kingRows || []);
      let html = `<div class="board-shell"><div class="board">`;
      for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
          const key = `${row}-${col}`;
          const isDark = (row + col) % 2 === 1;
          const classes = ["sq", isDark ? "dark" : "light"];
          if (hints.has(key)) classes.push("hint");
          if (captures.has(key)) classes.push("capture");
          if (kingRows.has(String(row))) classes.push("king-row");
          html += `<div class="${classes.join(" ")}">`;
          if (pieces[key]) html += piece(pieces[key].side, pieces[key].king ? "king" : pieces[key].mark ? "mark" : "");
          html += `</div>`;
        }
      }
      html += `</div></div>`;
      return html;
    }

    function render() {
      const current = slides[index];
      document.getElementById("progress").style.width = `${((index + 1) / slides.length) * 100}%`;
      document.getElementById("count").textContent = `${index + 1}/${slides.length}`;
      document.getElementById("minutes").textContent = current.minutes ? minutesLabel(current.minutes) : "เริ่มเล่น";
      document.getElementById("elapsed").textContent = `${minutesLabel(slides.slice(0, index).reduce((sum, slide) => sum + slide.minutes, 0))} / ${minutesLabel(totalMinutes)}`;
      document.getElementById("back").disabled = index === 0;
      document.getElementById("next").disabled = index === slides.length - 1;
      document.getElementById("slide").innerHTML = current.html();
      const noteBox = document.getElementById("notes");
      noteBox.hidden = !showNotes;
      noteBox.textContent = notes[current.id] || "ใช้คำถามนำก่อนเฉลย ให้ผู้เรียนชี้ช่องบนกระดานจริง";
      bindEvents();
    }

    function bindEvents() {
      document.querySelectorAll("[data-move]").forEach((button) => button.addEventListener("click", () => { moveChoice = button.dataset.move; render(); }));
      document.querySelectorAll("[data-capture]").forEach((button) => button.addEventListener("click", () => { captureChoice = button.dataset.capture; render(); }));
      document.querySelectorAll("[data-forced]").forEach((button) => button.addEventListener("click", () => { forcedChoice = button.dataset.forced; render(); }));
      document.querySelectorAll("[data-chain]").forEach((button) => button.addEventListener("click", () => { chainStep = Number(button.dataset.chain); render(); }));
      document.querySelectorAll("[data-king]").forEach((button) => button.addEventListener("click", () => { kingChoice = button.dataset.king; render(); }));
      document.querySelectorAll("[data-quiz-one]").forEach((button) => button.addEventListener("click", () => { quizOne = button.dataset.quizOne; render(); }));
      document.querySelectorAll("[data-quiz-two]").forEach((button) => button.addEventListener("click", () => { quizTwo = button.dataset.quizTwo; render(); }));
    }

    function titleSlide() {
      return `<div class="layout split"><div><p class="eyebrow">Teach to Play</p><h1>หมากฮอสไทย เล่นเป็นในหนึ่งคาบ</h1><p class="prompt">รู้ช่องเดิน รู้กฎกิน รู้เข้าฮอส แล้วเริ่มเล่นจริงแบบไม่งง</p></div>${board({ pieces: { "6-1": {side:"light"}, "6-3": {side:"light"}, "6-5": {side:"light"}, "6-7": {side:"light"}, "7-0": {side:"light"}, "7-2": {side:"light"}, "7-4": {side:"light"}, "7-6": {side:"light"}, "0-1": {side:"dark"}, "0-3": {side:"dark"}, "0-5": {side:"dark"}, "0-7": {side:"dark"}, "1-0": {side:"dark"}, "1-2": {side:"dark"}, "1-4": {side:"dark"}, "1-6": {side:"dark"} } })}</div>`;
    }

    function setupSlide() {
      return `<div class="layout wide-split">${board({ pieces: { "6-1": {side:"light"}, "6-3": {side:"light"}, "6-5": {side:"light"}, "6-7": {side:"light"}, "7-0": {side:"light"}, "7-2": {side:"light"}, "7-4": {side:"light"}, "7-6": {side:"light"}, "0-1": {side:"dark"}, "0-3": {side:"dark"}, "0-5": {side:"dark"}, "0-7": {side:"dark"}, "1-0": {side:"dark"}, "1-2": {side:"dark"}, "1-4": {side:"dark"}, "1-6": {side:"dark"} } })}<div><p class="eyebrow">Setup</p><h2>ตั้งหมากบนช่องสีเข้ม ฝ่ายละ 8 ตัว</h2><div class="flow"><div class="rule-card"><strong>8×8</strong><span>ใช้เฉพาะช่องสีเข้ม</span></div><div class="rule-card"><strong>8 ตัว</strong><span>แต่ละฝ่ายมี 8 ตัว</span></div><div class="rule-card"><strong>2 แถว</strong><span>วางแถวหลังสุดและแถวถัดขึ้นมา</span></div><div class="rule-card"><strong>ผลัดกัน</strong><span>เดินคนละตา</span></div></div></div></div>`;
    }

    function moveSlide() {
      const feedback = {
        left: ["ถูกต้อง", "หมากธรรมดาเดินทแยงไปข้างหน้า 1 ช่อง"],
        right: ["ถูกต้อง", "ถ้าช่องว่างและเป็นทแยงหน้า เดินได้"],
        back: ["ยังไม่ถูก", "หมากธรรมดาห้ามเดินถอยหลัง"],
        straight: ["ยังไม่ถูก", "หมากฮอสเดินตามทแยง ไม่เดินตรง"]
      }[moveChoice];
      return `<div class="layout wide-split">${board({ pieces: { "4-3": {side:"light", mark:true} }, hints: ["3-2", "3-4"], captures: moveChoice === "back" ? ["5-2"] : moveChoice === "straight" ? ["3-3"] : [] })}<div><p class="eyebrow">Normal Move</p><h2>หมากธรรมดาเดินทแยงไปข้างหน้า</h2><div class="choice-row"><button class="${moveChoice==="left"?"active":"secondary"}" data-move="left">ไปซ้ายหน้า</button><button class="${moveChoice==="right"?"active":"secondary"}" data-move="right">ไปขวาหน้า</button><button class="${moveChoice==="back"?"active":"secondary"}" data-move="back">ถอยหลัง</button><button class="${moveChoice==="straight"?"active":"secondary"}" data-move="straight">เดินตรง</button></div>${feedback ? `<div class="feedback"><strong>${feedback[0]}</strong><p>${feedback[1]}</p></div>` : `<p class="prompt">เลือกว่าตัวที่วงไว้เดินไปช่องไหนได้</p>`}</div></div>`;
    }

    function captureSlide() {
      const feedback = {
        jump: ["ถูกต้อง", "กินโดยกระโดดข้ามหมากฝ่ายตรงข้าม แล้วลงช่องว่างด้านหลัง"],
        landEnemy: ["ยังไม่ถูก", "ช่องปลายทางต้องเป็นช่องว่าง ไม่ใช่ช่องที่มีหมากฝ่ายตรงข้าม"],
        side: ["ยังไม่ถูก", "เดินเฉย ๆ ไม่ใช่การกิน ถ้ามีโอกาสกินต้องกิน"],
        back: ["ยังไม่ถูก", "หมากธรรมดากินถอยหลังไม่ได้"]
      }[captureChoice];
      return `<div class="layout wide-split">${board({ pieces: { "5-2": {side:"light", mark:true}, "4-3": {side:"dark"} }, hints: ["3-4"], captures: ["4-3"] })}<div><p class="eyebrow">Capture</p><h2>การกินคือข้ามหมากคู่แข่งไปช่องว่าง</h2><div class="choice-row"><button class="${captureChoice==="jump"?"active":"secondary"}" data-capture="jump">ข้ามไปช่องหลังคู่แข่ง</button><button class="${captureChoice==="landEnemy"?"active":"secondary"}" data-capture="landEnemy">ลงช่องที่มีคู่แข่ง</button><button class="${captureChoice==="side"?"active":"secondary"}" data-capture="side">เดินไปช่องว่างข้าง ๆ</button><button class="${captureChoice==="back"?"active":"secondary"}" data-capture="back">กินถอยหลัง</button></div>${feedback ? `<div class="feedback"><strong>${feedback[0]}</strong><p>${feedback[1]}</p></div>` : `<p class="prompt">เลือกวิธีกินที่ถูกต้อง</p>`}</div></div>`;
    }

    function forcedSlide() {
      const feedback = {
        must: ["ถูกต้อง", "ถ้ามีทางกิน ต้องกิน ห้ามเลือกเดินธรรมดา"],
        walk: ["ยังไม่ถูก", "ช่องเดินธรรมดาอาจว่าง แต่กฎบังคับกินมาก่อน"],
        other: ["ยังไม่ถูก", "ถ้าหมากตัวอื่นกินได้ ก็ต้องเลือกการกินสักทาง"]
      }[forcedChoice];
      return `<div class="layout split"><div><p class="eyebrow">Forced Capture</p><h2>กฎสำคัญ: ถ้ากินได้ ต้องกิน</h2><p class="prompt">กฎนี้ทำให้เกิดแผนล่อ กับดัก และการคิดล่วงหน้า</p><div class="choice-row"><button class="${forcedChoice==="must"?"active":"secondary"}" data-forced="must">ต้องกิน</button><button class="${forcedChoice==="walk"?"active":"secondary"}" data-forced="walk">เดินธรรมดาได้</button><button class="${forcedChoice==="other"?"active":"secondary"}" data-forced="other">เดินตัวอื่นได้</button></div>${feedback ? `<div class="feedback"><strong>${feedback[0]}</strong><p>${feedback[1]}</p></div>` : ""}</div>${board({ pieces: { "5-2": {side:"light", mark:true}, "4-3": {side:"dark"}, "5-6": {side:"light"} }, hints: ["3-4"], captures: ["4-3"] })}</div>`;
    }

    function chainSlide() {
      const configs = [
        { pieces: { "5-0": {side:"light", mark:true}, "4-1": {side:"dark"}, "2-3": {side:"dark"} }, hints: ["3-2"], captures: ["4-1"] },
        { pieces: { "3-2": {side:"light", mark:true}, "2-3": {side:"dark"} }, hints: ["1-4"], captures: ["2-3"] },
        { pieces: { "1-4": {side:"light", mark:true} }, hints: [], captures: [] }
      ][chainStep];
      const text = [
        ["เริ่มกินตัวแรก", "กดขั้นต่อไปเพื่อดูว่ากินแล้วต้องทำอะไรต่อ"],
        ["ยังต้องกินต่อ", "ตัวเดิมอยู่ตำแหน่งใหม่ และยังมีทางกิน จึงต้องกินติดในตาเดียวกัน"],
        ["จบตา", "เมื่อกินต่อไม่ได้แล้วจึงเปลี่ยนตาให้อีกฝ่าย"]
      ][chainStep];
      return `<div class="layout wide-split">${board(configs)}<div><p class="eyebrow">Multi-Jump</p><h2>กินติด: ตัวเดิมกินต่อจนหมดทาง</h2><div class="choice-row"><button class="${chainStep===0?"active":"secondary"}" data-chain="0">เริ่ม</button><button class="${chainStep===1?"active":"secondary"}" data-chain="1">หลังข้ามครั้งที่ 1</button><button class="${chainStep===2?"active":"secondary"}" data-chain="2">หลังข้ามครั้งที่ 2</button></div><div class="feedback"><strong>${text[0]}</strong><p>${text[1]}</p></div></div></div>`;
    }

    function kingSlide() {
      const feedback = {
        yes: ["ถูกต้อง", "เมื่อหมากธรรมดาถึงแถวสุดท้ายของฝ่ายตรงข้าม จะเข้าฮอส/หงาย"],
        no: ["ยังไม่ถูก", "ถ้าอยู่ไม่ถึงแถวสุดท้าย ยังเป็นหมากธรรมดา"],
        pass: ["ระวัง", "ในกติกาหมากฮอสไทย ให้ดูตำแหน่งสุดท้ายว่าจบที่แถวสุดท้ายหรือไม่"]
      }[kingChoice];
      return `<div class="layout wide-split">${board({ pieces: { "1-2": {side:"light", mark:true}, "0-3": {side:"light", king:true} }, kingRows: ["0"] })}<div><p class="eyebrow">Promotion</p><h2>ถึงแถวสุดท้าย = เข้าฮอส</h2><p class="prompt">ฮอสคือหมากที่ทรงพลังที่สุด เดินและกินได้ 4 ทิศตามแนวทแยง</p><div class="choice-row"><button class="${kingChoice==="yes"?"active":"secondary"}" data-king="yes">ถึงแถวสุดท้ายแล้วหงาย</button><button class="${kingChoice==="no"?"active":"secondary"}" data-king="no">ยังไม่หงาย</button><button class="${kingChoice==="pass"?"active":"secondary"}" data-king="pass">ผ่านแถวสุดท้ายระหว่างกินติด</button></div>${feedback ? `<div class="feedback"><strong>${feedback[0]}</strong><p>${feedback[1]}</p></div>` : ""}</div></div>`;
    }

    function kingPowerSlide() {
      return `<div class="layout split"><div><p class="eyebrow">King Power</p><h2>ฮอสเดินไกลตามทแยงได้ทั้ง 4 ทิศ</h2><div class="three-grid"><div class="rule-card"><strong>เดินไกล</strong><span>ไม่จำกัด 1 ช่องเหมือนหมากธรรมดา</span></div><div class="rule-card"><strong>ถอยได้</strong><span>เดินหน้าและถอยหลังตามทแยง</span></div><div class="rule-card"><strong>กินหลายทาง</strong><span>เลือกเส้นทางกินที่ดีที่สุดได้</span></div></div></div>${board({ pieces: { "4-3": {side:"light", king:true, mark:true}, "2-1": {side:"dark"}, "2-5": {side:"dark"}, "6-1": {side:"dark"}, "6-5": {side:"dark"} }, hints: ["0-7", "1-0", "1-6", "7-0", "7-6"], captures: ["2-1", "2-5", "6-1", "6-5"] })}</div>`;
    }

    function winSlide() {
      return `<div class="layout"><p class="eyebrow">Win Condition</p><h2>ชนะเมื่ออีกฝ่ายไม่เหลือทางสู้</h2><div class="flow"><div class="rule-card"><strong>กินหมด</strong><span>ฝ่ายตรงข้ามไม่มีหมากเหลือ</span></div><div class="rule-card"><strong>เดินไม่ได้</strong><span>ถึงตาเขา แต่ไม่มีตาเดินที่ถูกกฎ</span></div><div class="rule-card"><strong>ยอมแพ้</strong><span>ใช้ในเกมจริงเมื่อเห็นว่าไล่ต่อไม่ได้</span></div><div class="rule-card"><strong>เล่นจริง</strong><span>เริ่มจาก 3 ตาแรกให้พูดเหตุผลทุกตา</span></div></div></div>`;
    }

    function quizOneSlide() {
      const feedback = {
        a: ["ยังไม่ถูก", "หมากธรรมดาเดินถอยหลังไม่ได้"],
        b: ["ถูกต้อง", "หมากธรรมดาเดินทแยงไปข้างหน้า 1 ช่อง และกินไปข้างหน้าเท่านั้น"],
        c: ["ยังไม่ถูก", "เดินตรงไม่ได้ ต้องเดินตามทแยง"],
        d: ["ยังไม่ถูก", "เดินบนช่องสีเข้มเท่านั้น"]
      }[quizOne];
      return `<div class="layout"><p class="eyebrow">Check 1</p><h2>หมากธรรมดาทำอะไรได้ถูกต้อง</h2><div class="quiz-grid"><button class="answer-card ${quizOne==="a"?"active":""}" data-quiz-one="a"><strong>A</strong><span>เดินถอยหลัง 1 ช่องได้</span></button><button class="answer-card ${quizOne==="b"?"active correct":""}" data-quiz-one="b"><strong>B</strong><span>เดินทแยงไปข้างหน้า 1 ช่อง</span></button><button class="answer-card ${quizOne==="c"?"active":""}" data-quiz-one="c"><strong>C</strong><span>เดินตรงไปข้างหน้าได้</span></button><button class="answer-card ${quizOne==="d"?"active":""}" data-quiz-one="d"><strong>D</strong><span>เดินบนช่องสีอ่อนก็ได้</span></button></div>${feedback ? `<div class="feedback"><strong>${feedback[0]}</strong><p>${feedback[1]}</p></div>` : `<p class="prompt">ตอบก่อนเฉลย เพื่อเช็กว่าพร้อมเล่นหรือยัง</p>`}</div>`;
    }

    function quizTwoSlide() {
      const feedback = {
        a: ["ยังไม่ถูก", "ถ้ามีโอกาสกิน ต้องกินก่อน"],
        b: ["ยังไม่ถูก", "กินติดต้องใช้ตัวเดิมกินต่อในตาเดียวกัน"],
        c: ["ถูกต้อง", "เข้าฮอสแล้วเดิน/กินตามทแยงได้ทั้ง 4 ทิศและเดินไกล"],
        d: ["ยังไม่ถูก", "noble เป็นของ Splendor ไม่เกี่ยวกับหมากฮอสไทย"]
      }[quizTwo];
      return `<div class="layout"><p class="eyebrow">Check 2</p><h2>ข้อใดอธิบายกฎสำคัญได้ถูกต้อง</h2><div class="quiz-grid"><button class="answer-card ${quizTwo==="a"?"active":""}" data-quiz-two="a"><strong>A</strong><span>ถ้ากินได้ จะเลือกเดินธรรมดาก็ได้</span></button><button class="answer-card ${quizTwo==="b"?"active":""}" data-quiz-two="b"><strong>B</strong><span>กินแล้วหยุดทันที แม้กินต่อได้</span></button><button class="answer-card ${quizTwo==="c"?"active correct":""}" data-quiz-two="c"><strong>C</strong><span>ฮอสเดินทแยงได้ 4 ทิศและเดินไกล</span></button><button class="answer-card ${quizTwo==="d"?"active":""}" data-quiz-two="d"><strong>D</strong><span>สะสม noble เพื่อรับคะแนน</span></button></div>${feedback ? `<div class="feedback"><strong>${feedback[0]}</strong><p>${feedback[1]}</p></div>` : `<p class="prompt">ตอบก่อนเริ่มเล่นจริง</p>`}</div>`;
    }

    function playSlide() {
      return `<div class="layout"><p class="eyebrow">Start Playing</p><h2>เริ่มเล่นจริง: 5 ตาแรกให้พูดก่อนเดิน</h2><div class="flow"><div class="rule-card"><strong>มอง</strong><span>มีทางกินหรือไม่</span></div><div class="rule-card"><strong>เลือก</strong><span>ถ้ากินได้ต้องกิน ถ้าไม่มีกินค่อยเดิน</span></div><div class="rule-card"><strong>คิดต่อ</strong><span>เดินแล้วจะโดนบังคับกินกลับไหม</span></div><div class="rule-card"><strong>ล่า</strong><span>พยายามเข้าฮอสโดยไม่เสียหมากฟรี</span></div></div><a class="link-button" href="../">กลับหน้าเมนูสไลด์</a></div>`;
    }

    document.getElementById("next").addEventListener("click", () => { index = Math.min(index + 1, slides.length - 1); showNotes = false; render(); });
    document.getElementById("back").addEventListener("click", () => { index = Math.max(index - 1, 0); showNotes = false; render(); });
    document.getElementById("noteToggle").addEventListener("click", () => { showNotes = !showNotes; render(); });
    document.getElementById("full").addEventListener("click", async () => {
      if (document.fullscreenElement) await document.exitFullscreen();
      else await document.documentElement.requestFullscreen();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") document.getElementById("next").click();
      if (event.key === "ArrowLeft") document.getElementById("back").click();
    });
    render();
  </script>
</body>
</html>
